services:
  postgres:
    image: postgres
    container_name: chat-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - chat-postgres-data:/var/lib/postgresql

volumes:
  chat-postgres-data:
